name: Deploy Storybook

# Publica o Storybook do @blustar/ui (monorepo, fonte única do DS) no GitHub Pages.
# Adaptado do pipeline original do repo blustar-ds: pnpm workspaces + Storybook
# em packages/ui, com build de @blustar/tokens antes (o ui consome tokens via dist).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Sem 'version' aqui: a versão vem do campo packageManager (pnpm@9.x) do
      # package.json raiz. Passar os dois causa "Multiple versions of pnpm specified".
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @blustar/tokens build
      - run: pnpm --filter @blustar/ui build-storybook
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/ui/storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
