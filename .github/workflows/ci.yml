name: CI

# Gate de check do app vanilla — espelha o pré-commit local (Biome, só js/).
# NÃO faz deploy: o deploy é Cloudflare Workers, fora deste pipeline.
# Mesmo biome.json do pré-commit (nags de idioma desativados): se o gate local
# passa, este CI passa.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check
